name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # See test.yml — @astragenie/astramem-contracts is PUBLIC on npmjs; pin the
      # scope to npmjs so a runner-global ~/.npmrc can't shadow it. No auth.
      - name: Point @astragenie scope at npmjs (contracts is public)
        shell: bash
        run: echo "@astragenie:registry=https://registry.npmjs.org" >> .npmrc
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type-check
        run: bun run typecheck
