name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # See test.yml — @astragenie/astramem-contracts is a private GitHub
      # Packages dependency; without this auth, bun install 401s.
      - name: Configure GitHub Packages auth
        shell: bash
        run: |
          {
            echo "@astragenie:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type-check
        run: bun run typecheck
