name: Auto-merge on green

# Hands-off merge policy (public-repo variant). Every non-draft, same-repo PR
# is armed for auto-merge, so GitHub squash-merges it the instant the main
# ruleset's required status check passes.
#
# Escape hatch: add a `hold` or `do-not-merge` label to block a PR.
#
# Runs on ubuntu-latest: this is a PUBLIC repo, which cannot use the org
# self-hosted runner group (fork-PR RCE risk), and public repos get free
# unlimited GitHub-hosted minutes. Fork PRs don't get secrets at all under
# `pull_request` (GitHub strips everything but a read-only GITHUB_TOKEN), so
# the Preflight step below fails loudly on fork PRs and the enable mutation
# never runs for them — by design, external PRs still get a human before
# they can reach main.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      # GitHub does not trigger workflow runs from pushes made with
      # GITHUB_TOKEN. Arming auto-merge with GITHUB_TOKEN therefore makes
      # GitHub perform the squash-merge as github-actions[bot], and the
      # resulting push to main fires NO `on: push` workflow — main CI,
      # actionlint and the publish jobs all silently skip.
      #
      # This is not hypothetical. It took out every push-triggered workflow on
      # main across all five repos from 2026-07-09 (when this workflow landed)
      # until 2026-07-16, and left @astragenie/astra-app-shell@2.11.0
      # unpublished for six days: Publish - NPM retries on every main push, and
      # 13 main pushes went by without firing it once.
      #
      # Fail loudly instead of falling back to GITHUB_TOKEN. memory carried
      # `secrets.AUTOMERGE_PAT || secrets.GITHUB_TOKEN`, the PAT was never
      # created, and the `||` silently selected the broken token — which is
      # precisely why a week-long outage stayed invisible. A red check here is
      # cheap: this workflow is NOT a required check in any repo's ruleset, so
      # PRs remain mergeable by hand, and a human merge *does* trigger the
      # `on: push` workflows. On fork PRs, AUTOMERGE_PAT is unavailable by
      # GitHub design, so this step fails every time — expected, and harmless
      # for the same reason.
      - name: Preflight — require AUTOMERGE_PAT
        shell: bash
        env:
          AUTOMERGE_PAT: ${{ secrets.AUTOMERGE_PAT }}
        run: |
          if [ -z "${AUTOMERGE_PAT}" ]; then
            echo "::error title=AUTOMERGE_PAT not set::Auto-merge is disarmed on purpose. Arming it with GITHUB_TOKEN would make GitHub squash-merge as github-actions[bot], and GITHUB_TOKEN pushes do NOT trigger on:push workflows — main CI and the publish jobs would silently skip (see the 2026-07-09..16 fleet outage). Fix: create an AUTOMERGE_PAT secret (PAT or GitHub App token with contents:write + pull-requests:write). Until then, merge PRs manually — a human merge triggers the push workflows correctly. (Expected/harmless on fork PRs: GitHub never exposes secrets other than a read-only GITHUB_TOKEN to pull_request runs from forks.)"
            exit 1
          fi

      - name: Arm or disarm auto-merge
        uses: actions/github-script@v7
        with:
          # Must be a real user/app token, NOT GITHUB_TOKEN — see the preflight
          # above. No `||` fallback: silent degradation is the bug being fixed.
          github-token: ${{ secrets.AUTOMERGE_PAT }}
          script: |
            const pr = context.payload.pull_request;
            const held = pr.labels.some(l => ['hold', 'do-not-merge'].includes(l.name));

            if (pr.draft || held) {
              core.info(`#${pr.number} is ${pr.draft ? 'draft' : 'held'} — disabling auto-merge.`);
              try {
                await github.graphql(
                  `mutation($id: ID!) {
                     disablePullRequestAutoMerge(input: { pullRequestId: $id }) { clientMutationId }
                   }`,
                  { id: pr.node_id }
                );
              } catch (e) {
                core.info(`disable no-op: ${e.message}`);
              }
              return;
            }

            core.info(`Arming squash auto-merge on #${pr.number}.`);
            try {
              await github.graphql(
                `mutation($id: ID!) {
                   enablePullRequestAutoMerge(input: { pullRequestId: $id, mergeMethod: SQUASH }) { clientMutationId }
                 }`,
                { id: pr.node_id }
              );
              core.info('Auto-merge enabled — will merge when required checks pass.');
            } catch (e) {
              core.warning(`enable auto-merge failed: ${e.message}`);
            }
