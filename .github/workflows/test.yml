name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  bun-tests:
    name: Tests (bun ${{ matrix.bun }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun: ['1.1.30', 'latest']
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type-check
        run: bun run typecheck
      - name: Run tests
        run: bun run test
