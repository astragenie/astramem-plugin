# Cross-OS CI for FEAT-4a v0.5.0 — Ubuntu/Windows × Bun '1.3'.
# Triggered on every push + PRs to main. Stage 4 of plugin Phase 3.
# Matrix: os (ubuntu-latest, windows-latest) × bun-version ('1.3').
# macOS dropped 2026-07-09 — 10x hosted-minute multiplier, guarded org-wide.
# Pinned per R10 architect review — 'latest' auto-update was #1 6-month footgun for Windows subprocess handling.
# Gates commits: 06d20a8 (wire_version), 4db957f (doctor), 5fb99e6 (wire-flow E2E).

name: Tests

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  bun-tests:
    name: Tests (bun ${{ matrix.bun-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        bun-version: ['1.3']
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      # The plugin depends on the private @astragenie/astramem-contracts package
      # on GitHub Packages. Without registry auth, `bun install` 401s and every
      # job dies at install. Write an .npmrc scoping @astragenie to the GitHub
      # Packages registry with a token. `shell: bash` so the heredoc + env
      # expansion behave identically on the windows-latest runner.
      - name: Configure GitHub Packages auth
        shell: bash
        run: |
          {
            echo "@astragenie:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } >> .npmrc
        env:
          # Use the built-in GITHUB_TOKEN — the astramem-contracts package grants
          # this repo read via "Manage Actions access", so no PAT scope needed.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type-check
        run: bun run typecheck
      - name: Run tests
        run: bun run test
