name: Tests

on:
  push:
  pull_request:

jobs:
  node-tests:
    name: Node tests
    uses: astragenie/common/.github/workflows/reusable-plugin-ci.yml@main
    with:
      os-matrix: '["ubuntu-latest","windows-latest","macos-latest"]'
      node-version: '20'
      install-cmd: ''
      bun-commands: |
        node --test tests/*.test.mjs --test-timeout=60000

  hook-tests:
    name: Hook env-resolution tests
    uses: astragenie/common/.github/workflows/reusable-plugin-ci.yml@main
    with:
      os-matrix: '["ubuntu-latest","windows-latest","macos-latest"]'
      node-version: '20'
      install-cmd: ''
      bun-commands: |
        bash tests/hooks-env-resolution.test.sh
